<!-- SLIDE: Title -->
<section>
  <div style="display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 36px; align-items: center; height: 100%; padding: 0 8px">

    <div style="text-align: left">
      <div class="section-badge" style="animation: slideDown 0.4s ease both">Academic Project · NLP</div>
      <h1 style="font-size: 1.55em; line-height: 1.15; margin: 0.45em 0 0.5em; color: var(--c1)">
